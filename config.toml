# Hybrid Stacking (LightGBM) — Trading Signal Configuration
# Bachelor's Thesis: Nguyen Duc Hieu | Advisor: Hoang Quoc Dung

# =============================================================================
# DATA
# =============================================================================
[data]
symbol = "XAUUSD"
timeframe = "1H"
market_tz = "America/New_York"
start_date = "2013-01-01"
end_date = "2026-03-31"
tick_size = 0.01
contract_size = 100
symbol_download = "XAUUSD"
asset_class = "fx"
download_concurrency = 20
download_force = false           # Force re-download even if file exists
download_skip_current_month = true  # Skip current month (incomplete data)

# =============================================================================
# SPLITTING
# =============================================================================
[splitting]
train_start = "2013-01-01"
train_end = "2022-03-31 23:59:59"
val_start = "2022-04-01"
val_end = "2024-03-31 23:59:59"
test_start = "2024-04-01"
test_end = "2026-03-31 23:59:59"
purge_bars = 25
embargo_bars = 50                     # gap between train and validation sets
embargo_scale_by_timeframe = true     # Keep same elapsed embargo duration when timeframe changes
embargo_reference_timeframe = "1H"   # base timeframe for embargo duration

# =============================================================================
# FEATURES
# =============================================================================
[features]
rsi_period = 14
atr_period = 14
macd_fast = 12
macd_slow = 26
macd_signal = 9
correlation_threshold = 0.75

# =============================================================================
# LABELS — Triple Barrier
# =============================================================================
[labels]
atr_multiplier = 1.5
horizon_bars = 24
num_classes = 3
min_atr = 0.5

# =============================================================================
# MODEL — LightGBM (receives GRU hidden states + static features)
# =============================================================================
[model]
use_optuna = true
optuna_trials = 100
optuna_timeout = 3600
num_leaves = 48
max_depth = 4
learning_rate = 0.03
n_estimators = 150
min_child_samples = 200
subsample = 0.70
subsample_freq = 5
feature_fraction = 0.60
reg_alpha = 0.1
reg_lambda = 10.0
early_stopping_rounds = 50

# =============================================================================
# BACKTEST — via backtesting.py
# =============================================================================
[backtest]
initial_capital = 10000.0
leverage = 30                       # CFD leverage ratio
spread_ticks = 35                   # spread in ticks
slippage_ticks = 5                  # slippage in ticks
commission_per_lot = 10.0           # Round-trip commission per lot
atr_stop_multiplier = 1.0          # ATR multiplier for stop-loss distance
lots_per_trade = 0.2                # fixed lot size per trade
confidence_threshold = 0.55         # Min predicted probability to trade (0 = disabled)

# =============================================================================
# GRU — Feature Extractor
# =============================================================================
[gru]
input_size = 4        # number of GRU input features
hidden_size = 32
num_layers = 2
sequence_length = 48
dropout = 0.4
learning_rate = 0.001
batch_size = 64
epochs = 30
patience = 10

# =============================================================================
# WORKFLOW
# =============================================================================
[workflow]
run_data_pipeline = true
run_feature_engineering = true
run_label_generation = true
run_data_splitting = true
run_model_training = true
run_backtest = true
run_reporting = true
force_rerun = false
random_seed = 2024
n_jobs = -1

# =============================================================================
# PATHS
# =============================================================================
[paths]
data_raw = "data/raw/XAUUSD"
data_processed = "data/processed"
ohlcv = "data/processed/ohlcv.parquet"
features = "data/processed/features.parquet"
labels = "data/processed/labels.parquet"
train_data = "data/processed/train.parquet"
val_data = "data/processed/val.parquet"
test_data = "data/processed/test.parquet"
model = "models/lightgbm_model.pkl"
gru_model = "models/gru_model.pt"
predictions = "data/predictions/final_predictions.parquet"
backtest_results = "results/backtest_results.json"
report = "results/thesis_report.md"
