# Hybrid Stacking (LSTM + LightGBM) - XAU/USD H1 Trading Signals
# Bachelor's Thesis Configuration
# Student: Nguyen Duc Hieu | Advisor: Hoang Quoc Dung

[metadata]
project = "xauusd-hybrid-stacking"
version = "0.1.0"
author = "Nguyen Duc Hieu"
student_id = "2151061192"
advisor = "Hoang Quoc Dung"
description = "Hybrid Stacking (LSTM + LightGBM) for XAU/USD H1 Trading Signal Prediction"

# =============================================================================
# DATA CONFIGURATION
# =============================================================================

[data]
# Source data (Dukascopy tick data)
raw_data_path = "data/raw/XAUUSD"
ohlcv_path = "data/processed/ohlcv.parquet"

# Timeframe
timeframe = "1H"  # H1 candles
timeframe_minutes = 60

# Timezone (DST-aware)
market_tz = "America/New_York"
day_roll_hour = 17  # New York close at 17:00

# Date range (entire dataset: 2018-01-01 to 2026-03)
start_date = "2018-01-01"
end_date = "2026-03-31"

# Asset parameters
tick_size = 0.01  # Minimum price movement
contract_size = 100  # Standard lot = 100 oz

# =============================================================================
# DATA SPLITTING (Updated Scheme - Market Regime Based with Walk-Forward CV)
# =============================================================================
#
# Train (60%): 2018-2022 - Extended foundation period covering:
#   - Trade War (2018-2019)
#   - COVID-19 shock (2020)
#   - Recovery + inflation (2021)
#   - Russia-Ukraine conflict start + Fed hikes begin (2022)
#
# Validation (15%): 2023 - High-rate + Gold ATH regime:
#   - Fed maintains high rates
#   - Gold breaks traditional inverse relationship with rates
#   - First ATH waves appear
#
# Test (25%): 2024-03/2026 - Newest regime (Out-of-Sample):
#   - US Election 2024
#   - Multiple ATH breaks
#   - Geopolitical tensions
#   - Real test for overfitting
#

[splitting]
train_start = "2018-01-01"
train_end = "2022-12-31 23:59:59"

val_start = "2023-01-01"
val_end = "2023-12-31 23:59:59"

test_start = "2024-01-01"
test_end = "2026-03-31 23:59:59"

# Purge and embargo to prevent leakage
purge_bars = 15  # Remove overlap between splits
embargo_bars = 10  # No evaluation on embargo bars

# Walk-Forward CV configuration for LightGBM hyperparameter tuning
walk_forward_window_type = "sliding"  # Options: "sliding" or "expanding"
walk_forward_train_years = 2  # Training window size in years
walk_forward_val_years = 1    # Validation window size in years
walk_forward_step_years = 1 # Step size between windows

# Auto-generated windows (based on train period 2018-2022):
# Window 1: Train 2018-2019 | Val 2020
# Window 2: Train 2019-2020 | Val 2021
# Window 3: Train 2020-2021 | Val 2022
# Window 4: Train 2021-2022 | Val 2023 (final tuning window)

# =============================================================================
# FEATURE ENGINEERING
# =============================================================================

[features]
features_path = "data/processed/features.parquet"
feature_list_path = "data/processed/feature_list.json"

# Technical indicators
use_technical = true
use_pivots = true
use_session = true
use_spread = true

# EMA periods
ema_periods = [20, 50, 200]

# RSI
rsi_period = 14

# MACD
macd_fast = 12
macd_slow = 26
macd_signal = 9

# ATR (for volatility features and Triple-Barrier)
atr_period = 14

# Pivot points (previous day's H, L, C)
pivot_lookback = 1

# Session encoding (Asia, London, NY AM, NY PM)
session_hours = [
    [0, 8],    # Asia: 00:00-08:00 NY
    [8, 17],   # London: 08:00-17:00 NY (includes NY AM)
    [17, 21],  # NY PM: 17:00-21:00 NY
]

# LAG features (OHLCV lags for non-sequential models)
lag_periods = [1, 2, 3, 5, 10]

# Target spread calculation
spread_multiplier = 0.5  # Multiplier for spread-based features

# Feature selection
drop_high_corr = true
correlation_threshold = 0.95

# =============================================================================
# TRIPLE-BARRIER LABELS
# =============================================================================

[labels]
labels_path = "data/processed/labels.parquet"

# Triple-Barrier parameters
atr_multiplier_tp = 2.0   # Take-profit = Close + 2 * ATR
atr_multiplier_sl = 1.0   # Stop-loss = Close - 1 * ATR

# Alternative: fixed pips (if ATR not available)
use_fixed_pips = false
tp_pips = 20
sl_pips = 10

# Time horizon (bars)
horizon_bars = 10

# Classes: +1 (Long), 0 (Hold/No trade), -1 (Short)
num_classes = 3

# Label mapping
class_labels = { "-1" = "Short", "0" = "Hold", "1" = "Long" }

# Minimum ATR threshold (to avoid division by zero or extreme values)
min_atr = 0.0001  # 0.01 pips

# =============================================================================
# MODELS - LIGHTGBM (Tree-based)
# =============================================================================

[models.tree]
model_path = "models/lightgbm_model.pkl"
predictions_path = "data/predictions/lightgbm_oof.parquet"

# Target encoding
prediction_type = "probabilities"  # Output probabilities for stacking

# Class imbalance handling
use_class_weights = true
use_downsampling = false
downsampling_ratio = 0.5

# Hyperparameter tuning
use_optuna = true
optuna_trials = 30  # Set to 100 for final thesis run
optuna_timeout = 3600  # seconds

# Cross-validation for tuning (now using Walk-Forward CV)
cv_folds = 5
cv_purge = 10
cv_embargo = 5

# Fixed hyperparameters (if not using Optuna)
num_leaves = 31
max_depth = -1
learning_rate = 0.05
n_estimators = 500
min_child_samples = 20
subsample = 0.8
subsample_freq = 5
colsample_bytree = 0.8
reg_alpha = 0.0
reg_lambda = 0.0

# Early stopping
early_stopping_rounds = 50

# Feature importance
compute_importance = true
importance_type = "gain"

# =============================================================================
# MODELS - LSTM (Sequential)
# =============================================================================

[models.lstm]
model_path = "models/lstm_model.pt"
predictions_path = "data/predictions/lstm_oof.parquet"
sequences_path = "data/processed/lstm_sequences.npz"

# Sequence parameters
sequence_length = 60  # 60 bars = 60 hours = 2.5 trading days
step_size = 1  # Overlapping sequences with step=1

# Architecture - REDUCED for faster training (thesis deadline optimization)
hidden_size = 64    # Reduced from 128 to 64 (2x speedup, still functional)
num_layers = 1      # Reduced from 2 to 1 (2x speedup, less overfitting risk)
dropout = 0.3
bidirectional = false

# Training - REDUCED epochs for faster training
batch_size = 128    # Increased from 64 (2x speedup, good convergence)
epochs = 50         # Reduced from 100 (2x speedup, sufficient for thesis)
learning_rate = 0.001
weight_decay = 1e-5

# Early stopping - MORE AGGRESSIVE
patience = 10       # Reduced from 15 (stop sooner if not improving)
min_delta = 0.001   # Increased from 0.0001 (less strict, faster convergence)

# Device (CPU only)
device = "cpu"
num_workers = 4

# Save best model
save_best = true

# =============================================================================
# MODELS - HYBRID STACKING (Meta-learner)
# =============================================================================

[models.stacking]
model_path = "models/stacking_meta_learner.pkl"
meta_predictions_path = "data/predictions/stacking_predictions.parquet"

# Meta-learner type
meta_learner = "logistic_regression"  # Options: logistic_regression, ridge, lasso, elastic_net, lightgbm

# OOF (out-of-fold) predictions
n_folds = 5

# Purge/embargo for stacking CV
stacking_purge = 10
stacking_embargo = 5

# Meta-learner regularization
C = 1.0  # Inverse regularization strength for logistic regression
alpha = 1.0  # Regularization for ridge/lasso
l1_ratio = 0.5  # For elastic_net

# Probability calibration
calibrate_probabilities = true
calibration_method = "isotonic"  # Options: isotonic, sigmoid (Platt scaling)

# =============================================================================
# BACKTESTING (CFD Simulation)
# =============================================================================

[backtest.cfd]
backtest_results_path = "results/backtest_results.json"

# Trading costs
spread_pips = 2.0  # Typical spread for XAU/USD on H1
slippage_pips = 1.0  # Slippage assumption
commission_per_lot = 0.0  # Many brokers offer commission-free gold
swap_long = -10.0  # Swap for long positions (annualized %)
swap_short = 5.0   # Swap for short positions (annualized %)

# Account parameters
initial_capital = 100000.0  # USD
currency = "USD"
leverage = 100  # 1:100 leverage
max_positions = 1  # Only 1 position at a time

# Risk management
risk_per_trade = 0.01  # 1% risk per trade
position_size_method = "fixed_fractional"  # Options: fixed_fractional, kelly, optimal_f

# Stop-out
margin_call_level = 0.5  # 50% margin level
stop_out_level = 0.2  # 20% margin level

# Trading hours filter (avoid major events, weekends)
trade_sunday = false  # No trading Sunday NY open
trade_friday_close = false  # Close positions before Friday NY close (avoid weekend gap)
friday_close_hour = 21  # Friday 21:00 NY

# Evaluation
metrics = ["sharpe", "sortino", "max_drawdown", "calmar", "win_rate", "profit_factor", "avg_trade", "total_return"]

# One OOS evaluation only (to prevent overfitting)
single_oos_run = true

# =============================================================================
# REPORTING
# =============================================================================

[reporting]
report_path = "results/thesis_report.md"
report_json_path = "results/thesis_report.json"
shap_summary_path = "results/shap_summary.png"
feature_importance_path = "results/feature_importance.png"

# Plots
plot_predictions = true
plot_backtest_equity = true
plot_drawdown = true
plot_trade_distribution = true

# SHAP parameters
shap_samples = 1000  # Number of samples for SHAP analysis
shap_max_display = 20  # Top features to display

# Export formats
export_csv = true
export_excel = false

# =============================================================================
# WORKFLOW
# =============================================================================

[workflow]
# Stage execution
run_data_pipeline = true
run_feature_engineering = true
run_label_generation = true
run_data_splitting = true
run_lightgbm = true
run_lstm = true
run_stacking = true
run_backtest = true
run_reporting = true

# Force re-run (ignore cache)
force_rerun = false

# Parallel processing
n_jobs = -1  # Use all available CPU cores

# Random seed for reproducibility
random_seed = 42

# =============================================================================
# PATHS
# =============================================================================

[paths]
# Input/Output directories
data_raw = "data/raw/XAUUSD"
data_processed = "data/processed"
data_predictions = "data/predictions"
models = "models"
results = "results"
logs = "logs"

# Artifact files
ohlcv = "data/processed/ohlcv.parquet"
features = "data/processed/features.parquet"
labels = "data/processed/labels.parquet"

# Split datasets
train_data = "data/processed/train.parquet"
val_data = "data/processed/val.parquet"
test_data = "data/processed/test.parquet"

# Models
lgbm_model = "models/lightgbm_model.pkl"
lstm_model = "models/lstm_model.pt"
stacking_model = "models/stacking_meta_learner.pkl"

# Predictions
lgbm_oof = "data/predictions/lightgbm_oof.parquet"
lstm_oof = "data/predictions/lstm_oof.parquet"
final_predictions = "data/predictions/final_predictions.parquet"

# Results
backtest_results = "results/backtest_results.json"
final_report = "results/thesis_report.md"
