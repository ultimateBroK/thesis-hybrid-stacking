# Public experiment configuration.
# Hidden defaults live in src/thesis/shared/config.py.

# ── Data source ──────────────────────────────────────────────────────────────
[data]
symbol = "XAUUSD"                    # Ticker to trade
timeframe = "1H"                     # Bar granularity
market_tz = "America/New_York"       # Exchange timezone
tick_size = 0.01                     # Minimum price increment
contract_size = 100                  # Ounce value per lot

# ── Data range ──────────────────────────────────────────────────────────────
[data_range]
start = "2021-01-01"                # Ingestion start
end = "2026-04-30"                   # Ingestion end

# ── Walk-forward validation ─────────────────────────────────────────────────
[validation]
method = "sliding"
train_window_bars = 6240   # ~1.2 year train on 1H bars (20 bars/day)
test_window_bars = 1040    # ~52 day test window
step_bars = 1040           # non-overlapping ~52 day step
purge_bars = 48            # 2x 24h horizon; above typical trade hold time
embargo_bars = 50          # Gap to prevent information leakage
min_train_bars = 6000
oof_ensemble = true

# ── Feature engineering ──────────────────────────────────────────────────────
[features]
rsi_period = 14                   # RSI lookback
atr_period = 14                   # ATR lookback
adx_period = 14                   # ADX lookback
ema_slope_period = 20             # EMA slope lookback
macd_fast = 12                    # MACD fast EMA
macd_slow = 26                    # MACD slow EMA
macd_signal = 9                   # MACD signal line
correlation_threshold = 0.75      # Drop features above this pairwise correlation
# enable_regime_features = true   # Uncomment to enable regime features

# ── Multi-timeframe features ─────────────────────────────────────────────────
[features.multi_timeframe]
sma_periods = [50]                # SMA lookbacks for multi-timeframe
ema_long = 200                    # Long EMA period
bb_period = 20                    # Bollinger Bands period
bb_std = 2.0                      # Bollinger Bands std dev
return_lookbacks = [1, 4, 24]      # Return calculation lookbacks (1h, 4h, 1d)
range_lookback = 20               # Range z-score lookback
volume_zscore_period = 20         # Volume z-score lookback
atr_short_period = 5               # Short ATR for multi-timeframe
atr_long_period = 20               # Long ATR for multi-timeframe
consecutive_bars_window = 5       # Consecutive bars window
price_position_window = 20        # Price position lookback

# ── Label generation ─────────────────────────────────────────────────────────
[labels]
atr_tp_multiplier = 2.0           # Take-profit = multiplier × ATR
atr_sl_multiplier = 2.0           # Stop-loss   = multiplier × ATR
horizon_bars = 24                 # Forward-looking window (hours)

# ── Model selection ──────────────────────────────────────────────────────────
[model]
architecture = "stacking"
objective = "multiclass"           # Classification target: buy / hold / sell
lgbm_expanded_features = false    # Whether to use expanded feature set for LightGBM
num_leaves = 31                   # Max leaves per tree
max_depth = 6                     # Max tree depth
learning_rate = 0.03              # Boosting learning rate
n_estimators = 500                # Number of boosting rounds (early stopping finds best)
min_child_samples = 40            # Min samples per leaf
subsample = 0.80                  # Row subsample ratio
subsample_freq = 5                # Subsample every N rounds
feature_fraction = 0.80           # Column subsample per tree
reg_alpha = 0.05                  # L1 regularization
reg_lambda = 1.0                  # L2 regularization
early_stopping_rounds = 30        # Stop if no improvement for N rounds
stacking_base_models = ["logistic_regression", "random_forest", "lightgbm"]
stacking_meta_model = "logistic_regression"
stacking_meta_fraction = 0.20
stacking_passthrough = false
stacking_internal_folds = 5              # 0 = legacy 80/20 split; ≥2 = expanding-origin OOF
stacking_internal_purge = 0              # 0 = auto (uses labels.horizon_bars)
stacking_calibrate_base = false           # Apply Platt scaling to base model probabilities
stacking_calibration_fraction = 0.0       # Fraction of train for calibration (e.g. 0.10); 0 = disabled
prediction_confidence_threshold = 0.0    # 0 = argmax; >0 = gate low-conviction into HOLD
random_forest_n_estimators = 300
random_forest_max_depth = 6
random_forest_min_samples_leaf = 80

# ── Backtesting engine ──────────────────────────────────────────────────────
[backtest]
initial_capital = 10000.0          # Starting account equity
leverage = 10                      # Broker leverage multiplier
spread_ticks = 35                  # Bid-ask spread in ticks
slippage_ticks = 5                 # Execution slippage in ticks
commission_per_lot = 10.0          # Round-turn commission per lot
atr_stop_multiplier = 2.0          # ATR-based stop-loss (aligned with labels)
atr_tp_multiplier = 2.0            # ATR-based take-profit (aligned with labels)
lots_per_trade = 0.02              # Default position size (was 0.01)
min_lots = 0.01                    # Minimum allowed lots
max_lots = 0.5                     # Maximum allowed lots
confidence_threshold = 0.50        # Min model confidence to trade
min_bars_between_trades = 18       # Cooldown bars between entries (was 12)
max_drawdown_cutoff = 0.30         # Halt trading if drawdown exceeds this
dd_cooldown_bars = 12              # Cooldown after max drawdown trigger
max_open_positions = 1             # Concurrent position limit
daily_loss_limit = 0.03            # Halt if daily loss exceeds 3% of equity

# ── Workflow controls ───────────────────────────────────────────────────────
[workflow]
force_rerun = false                # Ignore cached intermediates
random_seed = 2024                 # Global reproducibility seed
n_jobs = -1                        # Parallel workers (-1 = all cores)
