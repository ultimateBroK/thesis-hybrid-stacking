# Public experiment configuration.
# Hidden defaults live in src/thesis/shared/config.py.

[data]
symbol = "XAUUSD"
timeframe = "1H"
market_tz = "America/New_York"
start_date = "2018-01-01"
end_date = "2026-04-30"
tick_size = 0.01
contract_size = 100

[splitting]
train_start = "2021-01-01"
train_end = "2024-12-31 23:59:59"
val_start = "2025-01-01"
val_end = "2025-12-31 23:59:59"
test_start = "2026-01-01"
test_end = "2026-04-30 23:59:59"

[validation]
# Sliding walk-forward: 1-year train, 1-month test windows.
method = "sliding"
train_window_bars = 8760   # ~1 year on 1H bars
test_window_bars = 720     # ~1 month on 1H bars
step_bars = 720            # non-overlapping test windows
purge_bars = 48            # 2x 24h horizon; above typical trade hold time
embargo_bars = 50
min_train_bars = 6000

# static_feature_cols are the default LightGBM features. See thesis.shared.feature_registry for the canonical column lists.
[features]
rsi_period = 14
atr_period = 14
adx_period = 14
ema_slope_period = 20
macd_fast = 12
macd_slow = 26
macd_signal = 9
correlation_threshold = 0.75

[labels]
atr_tp_multiplier = 2.0
atr_sl_multiplier = 2.0
horizon_bars = 24

[model]
architecture = "hybrid"  # "static" or "hybrid"
objective = "multiclass"
static_expanded = false
num_leaves = 31
max_depth = 6
learning_rate = 0.02
n_estimators = 500
min_child_samples = 50
subsample = 0.80
subsample_freq = 5
feature_fraction = 0.70
reg_alpha = 0.05
reg_lambda = 5.0
early_stopping_rounds = 40

[gru]
objective = "multiclass"
hidden_size = 64
num_layers = 2
sequence_length = 48
dropout = 0.3
learning_rate = 0.0005
batch_size = 256
epochs = 100
patience = 20
min_epochs = 10
bidirectional = false
gradient_accumulation_steps = 1
warmup_epochs = 3
contrastive_pretrain_epochs = 10
temperature_scaling = false
pca_components = 16

[backtest]
initial_capital = 10000.0
leverage = 10
spread_ticks = 35
slippage_ticks = 5
commission_per_lot = 10.0
atr_stop_multiplier = 2.0
atr_tp_multiplier = 2.0
lots_per_trade = 0.01
min_lots = 0.01
max_lots = 0.5
confidence_threshold = 0.50
min_bars_between_trades = 6
max_drawdown_cutoff = 0.30
dd_cooldown_bars = 12
max_open_positions = 1
daily_loss_limit = 0.03

[workflow]
force_rerun = false
random_seed = 2024
n_jobs = -1
