# Hybrid Stacking (LightGBM) — XAU/USD H1 Trading Signals
# Bachelor's Thesis: Nguyen Duc Hieu | Advisor: Hoang Quoc Dung

# =============================================================================
# DATA
# =============================================================================
[data]
symbol = "XAUUSD"
timeframe = "1H"
market_tz = "America/New_York"
start_date = "2018-01-01"
end_date = "2026-03-31"
tick_size = 0.01
contract_size = 100
symbol_download = "XAUUSD"
asset_class = "fx"
download_concurrency = 20
download_force = false           # Force re-download even if file exists
download_skip_current_month = true  # Skip current month (incomplete data)

# =============================================================================
# SPLITTING
# =============================================================================
[splitting]
train_start = "2018-01-01"
train_end = "2022-12-31 23:59:59"    # 5 years: diverse market regimes
val_start = "2023-01-01"              # 1 year: transition period
val_end = "2023-12-31 23:59:59"
test_start = "2024-01-01"             # OOS: gold bull run $2000→$3000+
test_end = "2026-03-31 23:59:59"
purge_bars = 25
embargo_bars = 50                     # ~2 days — conservative vs 10-bar label horizon
embargo_scale_by_timeframe = true     # Keep same elapsed embargo duration when timeframe changes
embargo_reference_timeframe = "1H"   # 50 bars is defined at 1H; e.g. 1D -> ~2 bars

# =============================================================================
# FEATURES
# =============================================================================
[features]
rsi_period = 14
atr_period = 14
macd_fast = 12
macd_slow = 26
macd_signal = 9
correlation_threshold = 0.75

# =============================================================================
# LABELS — Triple Barrier
# =============================================================================
[labels]
atr_multiplier = 1.5
horizon_bars = 24
num_classes = 3
min_atr = 0.5

# =============================================================================
# MODEL — LightGBM (receives GRU hidden states + static features)
# =============================================================================
[model]
use_optuna = true
optuna_trials = 100
optuna_timeout = 3600
num_leaves = 48
max_depth = 4
learning_rate = 0.03
n_estimators = 150
min_child_samples = 200
subsample = 0.70
subsample_freq = 5
feature_fraction = 0.60
reg_alpha = 0.1
reg_lambda = 10.0
early_stopping_rounds = 50

# =============================================================================
# BACKTEST — via backtesting.py
# =============================================================================
[backtest]
initial_capital = 10000.0
leverage = 30                       # 30:1 — affordable for 1 lot with $10k
spread_ticks = 35                   # 35 ticks = $0.35 (realistic XAUUSD ECN spread)
slippage_ticks = 5                  # 5 ticks = $0.05 per side (absorbed into spread)
commission_per_lot = 10.0           # Round-trip commission per lot
atr_stop_multiplier = 1.5          # ATR multiplier for stop-loss distance
lots_per_trade = 0.15                # Fixed 0.15 lot per trade (15 oz XAUUSD)
confidence_threshold = 0.6          # Min predicted probability to trade (0 = disabled)
# Auto lot sizing (risk-based position sizing)
auto_lot_sizing = true             # Enable dynamic lot sizing based on equity + risk %
risk_per_trade_pct = 1.0            # Risk % of equity per trade
min_lot_size = 0.1                  # Minimum lot size floor
max_lot_size = 5.0                 # Maximum lot size ceiling
# Enhanced auto lot sizing parameters
enable_performance_adjustment = true  # Adjust position size based on equity performance
enable_volatility_adjustment = true   # Reduce size during high volatility periods
max_capital_risk_pct = 10.0          # Maximum % of initial capital to risk per trade
performance_multiplier = 1.2         # Max position size increase when performing well
performance_reduction = 0.8          # Min position size when underperforming

# =============================================================================
# GRU — Feature Extractor
# =============================================================================
[gru]
input_size = 4        # log_returns + rsi_14 + atr_14 + macd_hist
hidden_size = 32
num_layers = 2
sequence_length = 48
dropout = 0.4
learning_rate = 0.001
batch_size = 64
epochs = 30
patience = 10

# =============================================================================
# WORKFLOW
# =============================================================================
[workflow]
run_data_pipeline = true
run_feature_engineering = true
run_label_generation = true
run_data_splitting = true
run_model_training = true
run_backtest = true
run_reporting = true
force_rerun = false
random_seed = 2024
n_jobs = -1

# =============================================================================
# PATHS
# =============================================================================
[paths]
data_raw = "data/raw/XAUUSD"
data_processed = "data/processed"
ohlcv = "data/processed/ohlcv.parquet"
features = "data/processed/features.parquet"
labels = "data/processed/labels.parquet"
train_data = "data/processed/train.parquet"
val_data = "data/processed/val.parquet"
test_data = "data/processed/test.parquet"
model = "models/lightgbm_model.pkl"
gru_model = "models/gru_model.pt"
predictions = "data/predictions/final_predictions.parquet"
backtest_results = "results/backtest_results.json"
report = "results/thesis_report.md"
