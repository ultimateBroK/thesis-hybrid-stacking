# Thesis experiment config — only research-relevant overrides.
# Full defaults: src/thesis/shared/config.py

# ── Data source ──────────────────────────────────────────────────────────────
[data]
symbol = "XAUUSD"
timeframe = "1H"

# ── Data range ──────────────────────────────────────────────────────────────
[data_range]
start = "2021-01-01"
end = "2026-04-30"

# ── Label generation ────────────────────────────────────────────────────────
[labels]
atr_tp_multiplier = 2.0
atr_sl_multiplier = 2.0
horizon_bars = 24
num_classes = 3

# ── Model ────────────────────────────────────────────────────────────────────
# Architecture: Hybrid Stacking (LR + RF + LightGBM → meta learner)

[model.logistic_regression]
C = 10.0
max_iter = 1000
solver = "lbfgs"

[model.random_forest]
n_estimators = 300
max_depth = 6
min_samples_leaf = 20

[model.lightgbm]
num_leaves = 31
max_depth = 6
learning_rate = 0.03
n_estimators = 800
min_child_samples = 40
subsample = 0.80
feature_fraction = 0.80
reg_alpha = 0.05
reg_lambda = 0.1

[model.stacking]
meta_fraction = 0.20

[model.stacking_meta]
learner = "logistic_regression"
meta_C = 1.0
max_iter = 1000
solver = "lbfgs"
penalty = "l2"
num_leaves = 7
max_depth = 2
learning_rate = 0.03
n_estimators = 150
min_child_samples = 80
subsample = 0.80
subsample_freq = 1
feature_fraction = 1.0
reg_alpha = 0.5
reg_lambda = 5.0
min_split_gain = 0.01

# ── Backtesting ──────────────────────────────────────────────────────────────
[backtest]
initial_capital = 10000.0
leverage = 10
spread_ticks = 35
lots_per_trade = 0.02
confidence_threshold = 0.60
min_bars_between_trades = 18
