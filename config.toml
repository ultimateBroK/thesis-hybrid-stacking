# Hybrid Stacking (LightGBM) — XAU/USD H1 Trading Signals
# Bachelor's Thesis: Nguyen Duc Hieu | Advisor: Hoang Quoc Dung

# =============================================================================
# DATA
# =============================================================================
[data]
symbol = "XAUUSD"
timeframe = "1H"
market_tz = "America/New_York"
start_date = "2018-01-01"
end_date = "2026-03-31"
tick_size = 0.01
contract_size = 100
symbol_download = "XAUUSD"
asset_class = "fx"
download_concurrency = 20

# =============================================================================
# SPLITTING
# =============================================================================
[splitting]
train_start = "2018-01-01"
train_end = "2022-12-31 23:59:59"    # 5 years: diverse market regimes
val_start = "2023-01-01"              # 1 year: transition period
val_end = "2023-12-31 23:59:59"
test_start = "2024-01-01"             # OOS: gold bull run $2000→$3000+
test_end = "2026-03-31 23:59:59"
purge_bars = 25
embargo_bars = 50                     # ~2 days — covers 24-bar label horizon

# =============================================================================
# FEATURES
# =============================================================================
[features]
rsi_period = 14
atr_period = 14
macd_fast = 12
macd_slow = 26
macd_signal = 9
correlation_threshold = 0.90

# =============================================================================
# LABELS — Triple Barrier
# =============================================================================
[labels]
atr_multiplier = 1.5
horizon_bars = 10
num_classes = 3
min_atr = 0.0001

# =============================================================================
# MODEL — LightGBM (receives GRU hidden states + static features)
# =============================================================================
[model]
use_optuna = false
optuna_trials = 50
optuna_timeout = 3600
num_leaves = 48
max_depth = 5
learning_rate = 0.03
n_estimators = 150
min_child_samples = 150
subsample = 0.70
subsample_freq = 5
feature_fraction = 0.60
reg_alpha = 0.1
reg_lambda = 5.0
early_stopping_rounds = 30

# =============================================================================
# BACKTEST — via backtesting.py
# =============================================================================
[backtest]
initial_capital = 10000.0
leverage = 30                       # 30:1 — affordable for 1 lot with $10k
spread_ticks = 30                   # 30 ticks = $0.30 (realistic XAUUSD ECN spread)
slippage_ticks = 3                  # 3 ticks = $0.03 per side (absorbed into spread)
commission_per_lot = 10.0           # Round-trip commission per lot
atr_stop_multiplier = 0.75          # ATR multiplier for stop-loss distance
lots_per_trade = 1.0                # Fixed 1 lot per trade (100 oz XAUUSD)
confidence_threshold = 0.70         # Min predicted probability to trade (0 = disabled)

# =============================================================================
# GRU — Feature Extractor
# =============================================================================
[gru]
input_size = 4        # log_returns + rsi_14 + atr_14 + macd_hist
hidden_size = 64
num_layers = 2
sequence_length = 24
dropout = 0.4
learning_rate = 0.001
batch_size = 64
epochs = 30
patience = 10

# =============================================================================
# WORKFLOW
# =============================================================================
[workflow]
run_data_pipeline = true
run_feature_engineering = true
run_label_generation = true
run_data_splitting = true
run_model_training = true
run_backtest = true
run_reporting = true
force_rerun = false
random_seed = 2024
n_jobs = -1

# =============================================================================
# PATHS
# =============================================================================
[paths]
data_raw = "data/raw/XAUUSD"
data_processed = "data/processed"
ohlcv = "data/processed/ohlcv.parquet"
features = "data/processed/features.parquet"
labels = "data/processed/labels.parquet"
train_data = "data/processed/train.parquet"
val_data = "data/processed/val.parquet"
test_data = "data/processed/test.parquet"
model = "models/lightgbm_model.pkl"
gru_model = "models/gru_model.pt"
predictions = "data/predictions/final_predictions.parquet"
backtest_results = "results/backtest_results.json"
report = "results/thesis_report.md"
