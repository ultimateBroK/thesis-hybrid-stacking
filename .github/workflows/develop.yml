name: Develop Branch Integration

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-develop
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default

      - name: Create minimal test data
        run: |
          mkdir -p data/raw data/processed
          python << 'EOF'
          import sys
          try:
              import polars as pl
              from datetime import datetime, timedelta

              n_bars = 100
              dates = [datetime(2024, 1, 1) + timedelta(hours=i) for i in range(n_bars)]

              data = {
                  'timestamp': dates,
                  'open': [1.0 + (i * 0.001) for i in range(n_bars)],
                  'high': [1.002 + (i * 0.001) for i in range(n_bars)],
                  'low': [0.998 + (i * 0.001) for i in range(n_bars)],
                  'close': [1.001 + (i * 0.001) for i in range(n_bars)],
                  'volume': [1000 + i * 10 for i in range(n_bars)]
              }

              df = pl.DataFrame(data)
              df.write_parquet('data/processed/test.parquet')
              print(f"Created test dataset: {n_bars} bars")

          except Exception as e:
              print(f"Warning: Could not create test data: {e}")
              open('data/processed/test.parquet', 'w').close()
          EOF

      - name: Test pipeline stage imports
        run: |
          echo "Testing module imports..."

          # Config
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.config import load_config
          config = load_config('config.toml')
          print('Config loading works')
          "

          # Aggregation (Stage 0)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.agg.ohlcv import _aggregate_file, prepare_data
          print('Aggregation module imports successfully')
          "

          # Features (Stage 1)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.features.indicators import generate_features
          print('Features module imports successfully')
          "

          # Labeling (Stage 2)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.labeling.triple_barrier import generate_labels
          print('Labeling module imports successfully')
          "

          # Splitting (Stage 3)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.splitting.split import split_data
          print('Splitting module imports successfully')
          "

          # GRU model (Stage 4)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.gru.arch import GRUExtractor
          print('GRU module imports successfully')
          "

          # Hybrid training (Stage 4)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.hybrid.train import train_model
          print('Hybrid training module imports successfully')
          "

          # Backtest (Stage 5)
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.backtest.strategy import run_backtest
          print('Backtest module imports successfully')
          "

      - name: Validate model artifacts (if exist)
        run: |
          echo "Checking model artifacts..."

          if [ -f "models/lightgbm_model.pkl" ]; then
            echo "LightGBM model exists"
            ls -lh models/lightgbm_model.pkl
          else
            echo "LightGBM model not yet trained"
          fi

          if [ -f "models/gru_model.pt" ]; then
            echo "GRU model exists"
            ls -lh models/gru_model.pt
          else
            echo "GRU model not yet trained"
          fi

  staging-deployment:
    name: Staging Deployment Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: integration-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify deployment readiness
        run: |
          echo "Checking deployment readiness..."

          # Check that main.py is executable
          if [ -x "main.py" ] || [ -f "main.py" ]; then
            echo "main.py present and ready"
          else
            echo "ERROR: main.py missing or not executable"
            exit 1
          fi

          # Verify pixi.toml has required tasks
          required_tasks=("workflow" "lint" "format" "test")
          for task in "${required_tasks[@]}"; do
            if grep -q "^\s*${task}\s*=" pixi.toml; then
              echo "Task '$task' defined in pixi.toml"
            else
              echo "WARNING: Task '$task' not found in pixi.toml"
            fi
          done

          echo ""
          echo "Staging deployment check passed"

      - name: Generate deployment summary
        run: |
          echo "## Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** develop" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "Deployment readiness verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Review changes before merging to main" >> $GITHUB_STEP_SUMMARY
          echo "- Ensure all feature branches are up to date" >> $GITHUB_STEP_SUMMARY

  notify-develop-push:
    name: Notify Develop Push
    runs-on: ubuntu-latest
    needs: [integration-tests, staging-deployment]
    if: always()

    steps:
      - name: Send notification
        run: |
          echo "Develop branch updated!"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Branch: develop"
          echo "Commit: ${GITHUB_SHA:0:7}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Staging check: ${{ needs.staging-deployment.result }}"
