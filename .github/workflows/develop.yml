name: Develop Branch Integration

on:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-develop
  cancel-in-progress: false

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default

      - name: Create minimal test data
        run: |
          mkdir -p data/raw data/processed
          # Create a small synthetic dataset for testing
          python << 'EOF'
          import sys
          try:
              import polars as pl
              from datetime import datetime, timedelta
              
              # Generate minimal OHLCV data for testing
              n_bars = 100
              dates = [datetime(2024, 1, 1) + timedelta(hours=i) for i in range(n_bars)]
              
              data = {
                  'timestamp': dates,
                  'open': [1.0 + (i * 0.001) for i in range(n_bars)],
                  'high': [1.002 + (i * 0.001) for i in range(n_bars)],
                  'low': [0.998 + (i * 0.001) for i in range(n_bars)],
                  'close': [1.001 + (i * 0.001) for i in range(n_bars)],
                  'volume': [1000 + i * 10 for i in range(n_bars)]
              }
              
              df = pl.DataFrame(data)
              df.write_parquet('data/processed/test.parquet')
              print(f"✓ Created test dataset: {n_bars} bars")
              
          except Exception as e:
              print(f"Warning: Could not create test data: {e}")
              # Create empty file as placeholder
              open('data/processed/test.parquet', 'w').close()
          EOF

      - name: Test pipeline stages individually
        run: |
          echo "Testing individual pipeline stages..."
          
          # Test configuration loading
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.config.loader import load_config
          config = load_config('config.toml')
          print('✓ Config loading works')
          "
          
          # Test data module imports
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.data import tick_to_ohlcv
          from thesis.data import splitting
          print('✓ Data modules import successfully')
          "
          
          # Test features module imports
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.features import engineering
          print('✓ Features module imports successfully')
          "
          
          # Test labels module imports
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.labels import triple_barrier
          print('✓ Labels module imports successfully')
          "
          
          # Test models module imports
          pixi run -- python -c "
          import sys
          sys.path.insert(0, 'src')
          from thesis.models import lightgbm_model
          from thesis.models import lstm_model
          print('✓ Models modules import successfully')
          "

      - name: Validate model artifacts (if exist)
        run: |
          echo "Checking model artifacts..."
          
          if [ -f "models/lightgbm_model.pkl" ]; then
            echo "✓ LightGBM model exists"
            ls -lh models/lightgbm_model.pkl
          else
            echo "ℹ️ LightGBM model not yet trained"
          fi
          
          if [ -f "models/lstm_model.pt" ]; then
            echo "✓ LSTM model exists"
            ls -lh models/lstm_model.pt
          else
            echo "ℹ️ LSTM model not yet trained"
          fi
          
          if [ -f "models/stacking_meta_learner.pkl" ]; then
            echo "✓ Stacking meta-learner exists"
            ls -lh models/stacking_meta_learner.pkl
          else
            echo "ℹ️ Stacking meta-learner not yet trained"
          fi

  staging-deployment:
    name: Staging Deployment Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: integration-tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify deployment readiness
        run: |
          echo "Checking deployment readiness..."
          
          # Check that main.py is executable
          if [ -x "main.py" ] || [ -f "main.py" ]; then
            echo "✓ main.py present and ready"
          else
            echo "ERROR: main.py missing or not executable"
            exit 1
          fi
          
          # Verify pixi.toml has required tasks
          required_tasks=("run" "lint" "format" "test")
          for task in "${required_tasks[@]}"; do
            if grep -q "^\s*${task}\s*=" pixi.toml; then
              echo "✓ Task '$task' defined in pixi.toml"
            else
              echo "WARNING: Task '$task' not found in pixi.toml"
            fi
          done
          
          # Check documentation completeness
          doc_files=("README.md" "docs/Architecture.md" "docs/Quickstart.md")
          for doc in "${doc_files[@]}"; do
            if [ -f "$doc" ]; then
              echo "✓ Documentation present: $doc"
            else
              echo "WARNING: Documentation missing: $doc"
            fi
          done
          
          echo ""
          echo "✅ Staging deployment check passed"

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** develop" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ Integration tests passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment readiness verified" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Review changes before merging to main" >> $GITHUB_STEP_SUMMARY
          echo "- Ensure all feature branches are up to date" >> $GITHUB_STEP_SUMMARY
          echo "- Run final manual testing if required" >> $GITHUB_STEP_SUMMARY

  notify-develop-push:
    name: Notify Develop Push
    runs-on: ubuntu-latest
    needs: [integration-tests, staging-deployment]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "📢 Develop branch updated!"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Branch: develop"
          echo "Commit: ${GITHUB_SHA:0:7}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Staging check: ${{ needs.staging-deployment.result }}"
          echo ""
          
          # In production, this would send to Slack, Discord, or email
          # For now, just log the notification
          echo "✓ Notification logged (configure webhooks for external notifications)"
