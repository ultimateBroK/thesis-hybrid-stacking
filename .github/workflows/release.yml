name: Main Branch Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  final-validation:
    name: Final Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default

      - name: Run complete test suite
        run: |
          echo "Running complete test suite for release validation..."
          pixi run test

      - name: Validate version tag
        id: version_check
        run: |
          # Read version from pixi.toml
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pixi.toml | head -1 || echo "0.1.0")
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if tag already exists
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
          else
            echo "Tag v$VERSION will be created"
          fi

      - name: Verify documentation completeness
        run: |
          echo "Checking documentation completeness..."

          required_docs=(
            "README.md"
          )

          missing_docs=()
          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              missing_docs+=("$doc")
            fi
          done

          if [ ${#missing_docs[@]} -gt 0 ]; then
            echo "Missing documentation files:"
            printf '  - %s\n' "${missing_docs[@]}"
            exit 1
          else
            echo "All required documentation present"
          fi

          # Check docs directory exists
          if [ -d "docs" ]; then
            doc_count=$(find docs/ -name '*.md' | wc -l)
            echo "Documentation directory: $doc_count markdown files"
          fi

      - name: Build verification report
        run: |
          echo "## Release Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version_check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Validation Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Code quality checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- Test suite executed" >> $GITHUB_STEP_SUMMARY
          echo "- Version verified" >> $GITHUB_STEP_SUMMARY
          echo "- Documentation reviewed" >> $GITHUB_STEP_SUMMARY

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: final-validation
    permissions:
      contents: write
      discussions: write
    outputs:
      tag_name: ${{ steps.get_version.outputs.version }}
      release_date: ${{ steps.release_date.outputs.date }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' pixi.toml | head -1 || echo "0.1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            echo "Generating changelog since $LAST_TAG..."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD 2>/dev/null || echo "No changes recorded")
          else
            echo "Generating changelog for all commits..."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" 2>/dev/null | head -20)
          fi

          echo "$CHANGELOG" > /tmp/changelog.md

          {
            echo 'changelog<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Set release date
        id: release_date
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          echo "date=$RELEASE_DATE" >> $GITHUB_OUTPUT
          echo "Release date: $RELEASE_DATE"

      - name: Create Git tag
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          TAG="v${{ steps.get_version.outputs.version }}"

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag -a "$TAG" -m "Release $TAG - Hybrid GRU + LightGBM Thesis"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }} - Hybrid GRU + LightGBM Thesis
          body: |
            ## Release Notes

            **Version:** ${{ steps.get_version.outputs.version }}
            **Date:** ${{ steps.release_date.outputs.date }}
            **Thesis:** Hybrid GRU + LightGBM for XAU/USD H1 Trading Signals

            ## Changes Since Last Release

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd thesis
            pixi install
            pixi run workflow
            ```

            ## Key Features

            - Hybrid GRU + LightGBM ensemble
            - Triple-barrier method for labeling
            - Comprehensive feature engineering (40+ indicators)
            - Purge + embargo train/val/test splitting
            - Full CFD backtesting engine
            - Optuna hyperparameter tuning
            - Automated reporting with 12 charts

            ---

            *Bachelor's Thesis - Thuy Loi University*
            *Student: Nguyen Duc Hieu | Advisor: Hoang Quoc Dung*
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true

  deploy-artifacts:
    name: Deploy Release Artifacts
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: default

      - name: Prepare release artifacts
        run: |
          echo "Preparing release artifacts..."

          mkdir -p release-artifacts

          cp pixi.toml release-artifacts/
          cp config.toml release-artifacts/
          cp README.md release-artifacts/

          # Copy documentation if exists
          if [ -d "docs" ]; then
            cp -r docs/ release-artifacts/
          fi

          # Create source archive
          tar -czf release-artifacts/thesis-source.tar.gz \
            --exclude='.git' \
            --exclude='.pixi' \
            --exclude='data/raw' \
            --exclude='data/processed' \
            --exclude='models/*.pkl' \
            --exclude='models/*.pt' \
            --exclude='results' \
            --exclude='logs' \
            --exclude='.pytest_cache' \
            --exclude='.ruff_cache' \
            src/ main.py pixi.toml config.toml README.md

          echo "Artifacts prepared"
          ls -lh release-artifacts/

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.create-release.outputs.tag_name }}
          files: |
            release-artifacts/thesis-source.tar.gz
        continue-on-error: true

  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [final-validation, create-release, deploy-artifacts]
    if: always()

    steps:
      - name: Send release notification
        run: |
          echo "RELEASE PUBLISHED!"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Version: v${{ needs.create-release.outputs.tag_name }}"
          echo "Release Date: ${{ needs.create-release.outputs.release_date }}"
          echo "Branch: main"
          echo ""
          echo "Validation: ${{ needs.final-validation.result }}"
          echo "Release: ${{ needs.create-release.result }}"
          echo "Artifacts: ${{ needs.deploy-artifacts.result }}"
          echo ""
          echo "View release: https://github.com/${{ github.repository }}/releases"

          echo "## Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.create-release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release Date:** ${{ needs.create-release.outputs.release_date }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://github.com/${{ github.repository }}/releases" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "- Final Validation: ${{ needs.final-validation.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Release Creation: ${{ needs.create-release.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact Deployment: ${{ needs.deploy-artifacts.result }}" >> $GITHUB_STEP_SUMMARY
