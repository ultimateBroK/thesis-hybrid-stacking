[tool:pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=src/thesis
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=70
    -W ignore::_pytest.warning_types.PytestUnknownMarkWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    data: tests for data processing
    features: tests for feature engineering
    models: tests for ML models
    backtest: tests for backtesting
    critical: critical tests that must pass
filterwarnings =
    ignore::DeprecationWarning:ta_lib.*
    ignore::FutureWarning:sklearn.*
    ignore::UserWarning:torch.*
    ignore::_pytest.warning_types.PytestUnknownMarkWarning
